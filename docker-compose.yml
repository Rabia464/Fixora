version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fixora-db
    restart: always
    environment:
      POSTGRES_USER: fixora_user
      POSTGRES_PASSWORD: fixora_password
      POSTGRES_DB: fixora_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fixora-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: fixora-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fixora.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - '5050:80'
    depends_on:
      - db
    networks:
      - fixora-network

volumes:
  postgres_data:
    driver: local

networks:
  fixora-network:
    driver: bridge
